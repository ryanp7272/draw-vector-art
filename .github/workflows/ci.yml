name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node:
          - 20
          - 22
    defaults:
      run:
        working-directory: plugins/draw-vector-art/skills/draw-vector-art
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: plugins/draw-vector-art/skills/draw-vector-art/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build, test, and regenerate the packaged runtime
        run: npm run check

      - name: Verify the packaged runtime is current
        shell: bash
        run: |
          set -euo pipefail
          runtime_status="$(git status --porcelain --untracked-files=all -- runtime)"
          if [[ -n "$runtime_status" ]]; then
            printf '%s\n' "$runtime_status"
            exit 1
          fi

  packaged-plugin-smoke:
    name: Clean packaged-plugin bootstrap
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Export a clean plugin package
        shell: bash
        run: |
          set -euo pipefail
          archive_root="$RUNNER_TEMP/draw vector art package"
          mkdir -p "$archive_root"
          git archive --format=tar HEAD plugins/draw-vector-art | tar -xf - -C "$archive_root"
          test ! -d "$archive_root/plugins/draw-vector-art/skills/draw-vector-art/node_modules"

      - name: Bootstrap and exercise the packaged engine
        shell: bash
        run: |
          set -euo pipefail
          archive_root="$RUNNER_TEMP/draw vector art package"
          skill_root="$archive_root/plugins/draw-vector-art/skills/draw-vector-art"
          output_root="$RUNNER_TEMP/draw vector art output"
          benchmark_root="$RUNNER_TEMP/draw vector art benchmark"
          empty_path="$RUNNER_TEMP/empty executable path"
          export DRAW_VECTOR_ART_CACHE_DIR="$RUNNER_TEMP/draw vector art runtime cache"

          cd "$skill_root"
          node scripts/run-engine.mjs doctor
          node scripts/run-engine.mjs prepare
          node scripts/run-engine.mjs schema --out "$RUNNER_TEMP/draw vector art schema.json"

          node_path="$(command -v node)"
          mkdir -p "$empty_path"
          PATH="$empty_path" "$node_path" scripts/run-engine.mjs render \
            tests/fixtures/rocket.scene.json \
            --out "$output_root"
          PATH="$empty_path" "$node_path" scripts/run-engine.mjs benchmark \
            tests/evaluation/pilot/run.json \
            --out "$benchmark_root"

          test -s "$RUNNER_TEMP/draw vector art schema.json"
          test -s "$output_root/drawing.svg"
          test -s "$output_root/preview-64.png"
          test -s "$output_root/preview-256.png"
          test -s "$output_root/preview-1024.png"
          test -s "$output_root/debug.png"
          test -s "$output_root/report.json"
          test -s "$benchmark_root/report.json"
          test -s "$benchmark_root/text-rocket/blind-64.png"
          reference_asset="$(find "$DRAW_VECTOR_ART_CACHE_DIR" -path '*/assets/evaluation-references/fox-badge.svg' -type f -print -quit)"
          test -s "$reference_asset"
